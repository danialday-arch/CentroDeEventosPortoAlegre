server:
  port: 8082
  #Hbilitar mostrar errores :3
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: ms-clientes
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/portoalegre_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update # Lo dejamos en update para no perder datos
    show-sql: true